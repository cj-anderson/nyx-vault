<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Nyx</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        width: 300px;
        margin: 0;
        padding: 10px;
        overflow-x: hidden;
      }

      h3 {
        margin-top: 0;
      }

      input {
        width: 100%;
        margin-bottom: 6px;
        padding: 6px;
      }

      button {
        width: 100%;
        padding: 6px;
        cursor: pointer;
      }

      .note {
        border: 1px solid #ccc;
        padding: 8px;
        margin-top: 8px;
        border-radius: 6px;
        cursor: pointer;
      }

      .note:hover {
        background: #f3f3f3;
      }

      /* Modal */

      #modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.5);

        display: none;

        justify-content: center;
        align-items: center;
      }

      #modal.show {
        display: flex;
      }

      #modalBox {
        background: white;
        padding: 10px;
        width: 90%;
        border-radius: 8px;

        max-height: 80vh;
        overflow-y: auto;
      }

      #modalBox button {
        margin-top: 6px;
      }

      #modalContent {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <h3>Nyx</h3>

    <input id="titleInput" placeholder="Title (optional)" />
    <input id="contentInput" placeholder="Write a note..." />

    <button id="saveBtn">Save</button>

    <div id="notesList"></div>

    <!-- Modal -->

    <div id="modal">
      <div id="modalBox">
        <h3 id="modalTitle"></h3>

        <p id="modalContent"></p>

        <button id="closeBtn">Close</button>
        <button id="deleteBtn">Delete</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
