<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Nyx</title>

    <link rel="stylesheet" href="styles.css" />

    <!-- Inconsolata Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1 class="logo">Nyx</h1>

    <div class="input-section">
      <input
        id="titleInput"
        placeholder="Title (optional)"
      />

      <textarea
        id="contentInput"
        placeholder="Write a note..."
        rows="4"
      ></textarea>

      <button id="saveBtn">
        Save Note
      </button>
    </div>

    <div id="notesList"></div>

    <!-- Modal -->

    <div id="modal">
      <div id="modalBox">
        <h2 id="modalTitle"></h2>

        <p id="modalContent"></p>

        <div class="modal-buttons">
          <button id="closeBtn">
            Close
          </button>

          <button id="deleteBtn" class="danger">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
